<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0b0d12"/>
            <stop offset="100%" stop-color="#151923"/>
        </linearGradient>
        <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#67e8f9"/>
        </linearGradient>
        <radialGradient id="orb1" cx="0.2" cy="0.3" r="0.5">
            <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="orb2" cx="0.8" cy="0.7" r="0.5">
            <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
        </radialGradient>
    </defs>
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#orb1)"/>
    <rect width="1200" height="630" fill="url(#orb2)"/>
    <g transform="translate(80, 200)">
        <text font-family="Inter, sans-serif" font-weight="800" font-size="92" fill="url(#text)" letter-spacing="-3">DevCraft.</text>
        <text y="100" font-family="Inter, sans-serif" font-weight="600" font-size="36" fill="#e8ecf3">Full-stack разработка.</text>
        <text y="150" font-family="Inter, sans-serif" font-weight="400" font-size="26" fill="#a4adbf">Лендинги · Telegram-боты · API на FastAPI</text>
        <g transform="translate(0, 220)">
            <rect width="240" height="56" rx="28" fill="url(#text)"/>
            <text x="120" y="36" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="20" fill="#0b0d12">github.com/devcraft</text>
        </g>
    </g>
    <g transform="translate(900, 80)" opacity="0.9">
        <rect width="220" height="280" rx="14" fill="#151923" stroke="rgba(255,255,255,0.1)"/>
        <circle cx="20" cy="22" r="6" fill="#ff5f57"/>
        <circle cx="40" cy="22" r="6" fill="#ffbd2e"/>
        <circle cx="60" cy="22" r="6" fill="#28ca42"/>
        <text x="14" y="80" font-family="JetBrains Mono, monospace" font-size="13" fill="#c084fc">from</text>
        <text x="14" y="100" font-family="JetBrains Mono, monospace" font-size="13" fill="#60a5fa">  fastapi</text>
        <text x="14" y="120" font-family="JetBrains Mono, monospace" font-size="13" fill="#c084fc">import</text>
        <text x="14" y="140" font-family="JetBrains Mono, monospace" font-size="13" fill="#e8ecf3">  FastAPI</text>
        <text x="14" y="180" font-family="JetBrains Mono, monospace" font-size="13" fill="#fbbf24">app = FastAPI()</text>
        <text x="14" y="220" font-family="JetBrains Mono, monospace" font-size="13" fill="#34d399">@app.get("/")</text>
        <text x="14" y="240" font-family="JetBrains Mono, monospace" font-size="13" fill="#f472b6">async def</text>
        <text x="14" y="260" font-family="JetBrains Mono, monospace" font-size="13" fill="#e8ecf3">  hello(): ...</text>
    </g>
</svg>
